<style>

  .tag.holiday{background:var(--gold);color:#0B1530;border-color:var(--gold);}
  .tag.open{background:var(--navy);color:#fff;border-color:var(--navy);}
  .tag.today{background:var(--gold);color:#0B1530;border-color:var(--gold);}
  .caret{flex:0 0 auto;color:var(--terra-dark);transition:transform 200ms ease;font-size:1.1rem;}
  .sess[aria-expanded-row="true"] .caret{transform:rotate(90deg);}
  .sess.noexp .caret{visibility:hidden;}

  /* today / this-week accents */
  .sess.is-today .sess-btn{background:#FBF4E4;box-shadow:inset 4px 0 0 var(--gold);}
  .sess.is-today .sess-btn:hover{background:#f7ecd3;}
  .sess.is-week .sess-btn{box-shadow:inset 4px 0 0 var(--terra);}

  .sess.type-exam .sess-topic{color:var(--terra-dark);}
  .sess.type-holiday .sess-btn{background:#FDF6E9;}

  /* ---------- DETAIL PANEL ---------- */
  .detail{background:var(--offwhite);border-top:1px dashed var(--navy-tint);padding:0 16px;max-height:0;overflow:hidden;transition:max-height 260ms ease;}

  .detail-block{margin:0 0 14px;}
  .detail-block:last-child{margin-bottom:0;}
  .detail-h{font-family:var(--font-eyebrow);font-weight:700;font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--terra-dark);margin:0 0 4px;}
  .detail-p{margin:0;color:var(--navy);font-size:.95rem;}
  .detail-note{font-family:var(--font-serif);font-style:italic;color:var(--navy);opacity:.7;font-size:.95rem;margin:0;}
  .detail-custom{white-space:pre-line;color:var(--navy);font-size:.98rem;}

  footer{background:var(--navy-darkest);color:var(--navy-tint);text-align:center;padding:1.9rem 1.5rem 1.7rem;border-top:2px solid var(--terra);border-radius:var(--radius);margin-top:42px;}

  .print-link{background:none;border:none;color:var(--gold-soft);font-family:var(--font-display);font-weight:700;font-size:.82rem;cursor:pointer;text-decoration:underline;margin-top:.8rem;}

    .detail-inner{padding-left:16px;}

  @media (prefers-reduced-motion: reduce){
    *{transition-duration:.01ms !important;animation:none !important;scroll-behavior:auto !important;}
  }
  @media print{
    .status,.toolbar,.jump,.caret,.print-link,.cover-cta{display:none !important;}
    .week{break-inside:avoid;}
    .detail{max-height:none !important;overflow:visible;}
    body{background:#fff;}
  }
</style>

  const nextExam=sessions.find(s=>s.type==='exam'&&s.ms>=todayMs)||null;

  /* ---- cover ---- */
  document.getElementById('coverSection').textContent=CONFIG.days+' · '+CONFIG.when+' Section';
  const meta=document.getElementById('coverMeta');
  meta.innerHTML=''
    +'<span class="chipm"><b>'+CONFIG.days+'</b> &middot; '+CONFIG.when+'</span>'
    +'<span class="chipm">CRN <b>'+CONFIG.crn+'</b></span>'
    +'<span class="chipm">'+CONFIG.room+'</span>';
  document.getElementById('coverTimes').innerHTML=''
    +'<div class="timecard"><span class="tl">Lecture</span>'+CONFIG.lecture.replace(/^Lecture · /,'')+'</div>'
    +'<div class="timecard"><span class="tl">Lab</span>'+CONFIG.lab.replace(/^Lab · /,'')+'</div>';

  /* ---- countdown ---- */
  const cdNum=document.getElementById('cdNum'),cdMain=document.getElementById('cdMain'),cdSub=document.getElementById('cdSub');
  if(nextExam){
    const days=Math.round((midnight(nextExam.dt).getTime()-todayMs)/DAY);
    if(days===0){cdNum.textContent='Today';cdNum.classList.add('done');cdMain.textContent=nextExam.topic;cdSub.textContent=DOW[nextExam.dt.getDay()]+', '+fmt(nextExam.dt);}
    else{cdNum.textContent=days;cdMain.textContent=nextExam.topic;cdSub.textContent=(days===1?'day':'days')+' away &middot; '+DOW[nextExam.dt.getDay()]+', '+fmt(nextExam.dt);cdSub.innerHTML=(days===1?'day':'days')+' away &middot; '+DOW[nextExam.dt.getDay()]+', '+fmt(nextExam.dt);}
  } else {
    cdNum.textContent='✓';cdNum.classList.add('done');
    cdMain.textContent=(todayMs>sessions[sessions.length-1].ms)?'Term complete':'All exams complete';
    cdSub.textContent='';
    document.querySelector('.cd-lab').textContent='Exams';
  }

  /* ---- build weeks ---- */
  const weeksEl=document.getElementById('weeks');
  const byWeek={};
  sessions.forEach(s=>{(byWeek[s.week]=byWeek[s.week]||[]).push(s);});
  const weekNums=Object.keys(byWeek).map(Number).sort((a,b)=>a-b);

  function detailHTML(s){
    if(s.type==='holiday') return '';
    if(s.details&&s.details.trim()){
      return '<div class="detail-inner"><div class="detail-custom">'+escapeHTML(s.details)+'</div></div>';
    }
    if(s.type==='exam'){
      return '<div class="detail-inner">'
        +'<div class="detail-block"><p class="detail-h">Exam Day</p><p class="detail-p">'+escapeHTML(s.topic)+' — bring a pencil and your student ID. No notes unless announced.</p></div>'
        +'<div class="detail-block"><p class="detail-note">Details coming soon — your instructor will post the exact stations, coverage, and format here.</p></div>'
        +'</div>';
    }
    // lab / open
    return '<div class="detail-inner">'
      +'<div class="detail-block"><p class="detail-h">Objectives</p><p class="detail-note">Coming soon.</p></div>'
      +'<div class="detail-block"><p class="detail-h">Structures to know</p><p class="detail-note">Coming soon.</p></div>'
      +'<div class="detail-block"><p class="detail-h">Pre-lab prep</p><p class="detail-note">Coming soon.</p></div>'
      +'</div>';
  }
  function escapeHTML(t){return t.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

  weekNums.forEach(wk=>{
    const list=byWeek[wk];
    const first=list[0].dt,last=list[list.length-1].dt;
    const week=document.createElement('section');
    week.className='week';
    week.dataset.week=wk;
    if(wk===currentWeek) week.classList.add('wk-current');
    let html='<div class="week-head"><span class="wk-n">Week '+wk+'</span>'
      +'<span class="week-current-tag">This week</span>'
      +'<span class="wk-range">'+fmt(first)+' – '+fmt(last)+'</span></div>';
    list.forEach((s,i)=>{
      const isToday=s.ms===todayMs;
      const isWeek=s.ms>=monThisWeek.getTime()&&s.ms<=sunThisWeek.getTime();
      const canExp=s.type!=='holiday';
      let cls='sess type-'+s.type;
      if(!canExp)cls+=' noexp';
      if(isToday)cls+=' is-today'; else if(isWeek)cls+=' is-week';
      const rowId='w'+wk+'s'+i;
      html+='<div class="'+cls+'" data-type="'+s.type+'" aria-expanded-row="false">';
      html+='<button class="sess-btn" type="button" '+(canExp?'aria-expanded="false" aria-controls="'+rowId+'"':'aria-disabled="true"')+'>';
      html+='<span class="date-badge"><span class="dow">'+s.day+'</span><span class="dnum">'+s.dt.getDate()+'</span><span class="mon">'+MONTHS[s.dt.getMonth()]+'</span></span>';
      html+='<span class="sess-main"><span class="sess-topic">'+escapeHTML(s.topic)+'</span><span class="sess-tags">';
      const tlabel={lab:'Lab',exam:'Exam',holiday:'No Class',open:'Open Lab'}[s.type];
      html+='<span class="tag '+s.type+'">'+tlabel+'</span>';
      if(isToday)html+='<span class="tag today">Today</span>';
      html+='</span></span>';
      html+='<span class="caret" aria-hidden="true">&#9656;</span>';
      html+='</button>';
      html+='<div class="detail" id="'+rowId+'" role="region">'+detailHTML(s)+'</div>';
      html+='</div>';
    });
    week.innerHTML=html;
    weeksEl.appendChild(week);
  });

  /* ---- expand / collapse ---- */
  weeksEl.addEventListener('click',e=>{
    const btn=e.target.closest('.sess-btn');
    if(!btn)return;
    const row=btn.closest('.sess');
    if(row.classList.contains('noexp'))return;
    const open=row.getAttribute('aria-expanded-row')==='true';
    row.setAttribute('aria-expanded-row',open?'false':'true');
    btn.setAttribute('aria-expanded',open?'false':'true');
  });

  /* ---- filters ---- */
  const chips=[...document.querySelectorAll('.chip')];
  chips.forEach(ch=>ch.addEventListener('click',()=>{
    chips.forEach(c=>c.setAttribute('aria-pressed','false'));
    ch.setAttribute('aria-pressed','true');
    const f=ch.dataset.filter;
    document.querySelectorAll('.sess').forEach(row=>{
      const t=row.dataset.type;
      let show=true;
      if(f==='lab')show=(t==='lab'||t==='open');
      else if(f==='exam')show=(t==='exam');
      else if(f==='off')show=(t==='holiday');
      row.classList.toggle('hidden',!show);
    });
    document.querySelectorAll('.week').forEach(w=>{
      const any=[...w.querySelectorAll('.sess')].some(r=>!r.classList.contains('hidden'));
      w.classList.toggle('hidden',!any);
    });
  }));

  /* ---- jump to this week ---- */
  const jump=document.getElementById('jumpBtn');
  if(currentWeek){
    jump.addEventListener('click',()=>{
      const el=document.querySelector('.week[data-week="'+currentWeek+'"]');
      if(el){el.scrollIntoView({behavior:'smooth',block:'start'});
        el.querySelector('.week-head').animate?el.querySelector('.week-head').animate([{filter:'brightness(1.25)'},{filter:'brightness(1)'}],{duration:900}):0;}
    });
    // auto-scroll on load if the term is in progress
    const firstMs=sessions[0].ms,lastMs=sessions[sessions.length-1].ms;
    if(todayMs>=firstMs&&todayMs<=lastMs){
      setTimeout(()=>{const el=document.querySelector('.week[data-week="'+currentWeek+'"]');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},400);
    }
  } else { jump.hidden=true; }

  /* ---- print ---- */
  document.getElementById('printBtn').addEventListener('click',()=>window.print());
})();
</script>
</body>
</html>
