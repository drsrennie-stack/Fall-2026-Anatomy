<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Human Anatomy Schedule, Fall 2026</title>
<meta name="description" content="Mastery OS course schedule for Human Anatomy, Fall 2026. Lecture and lab, M/W and T/R sections.">
<meta name="theme-color" content="#0B1530">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Mastery OS light surface. No cream fills; warm neutral is a light navy tint. */
:root{
  --navy:#0B1530;--card-navy:#1C2E4F;--near-black:#060A18;
  --rust:#8B3A2E;--terra:#C2734D;--terra-dark:#A0522D;--gold:#C9A14A;--gold-light:#D9B065;
  --white:#fff;--offwhite:#FAFAF9;--tint:#EDF1F3;--tint-2:#F3F0EA;--slate:#6E7488;
  --ink:#0B1530;--ink-soft:rgba(11,21,48,.72);--ink-faint:rgba(11,21,48,.5);
  --line:rgba(11,21,48,.12);--line-soft:rgba(11,21,48,.07);
  --ok:#3F7A5B;
  --disp:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'Plus Jakarta Sans',system-ui,sans-serif;--serif:'Plus Jakarta Sans',system-ui,sans-serif;
  --r-sm:8px;--r:12px;--r-lg:16px;--ease:cubic-bezier(.22,.61,.36,1);
  --shadow:0 1px 3px rgba(11,21,48,.08);--lift:0 14px 34px -16px rgba(11,21,48,.3);
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--offwhite);color:var(--ink);font-family:var(--disp);font-size:16px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden}
h1,h2,h3,h4{letter-spacing:-.02em;margin:0;color:var(--navy);line-height:1.15}
p{margin:0}
button{font-family:inherit;cursor:pointer}
.skip{position:absolute;left:-999px;top:0;background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r);z-index:999;font-weight:700;text-decoration:none}
.skip:focus{left:12px;top:12px}
:focus-visible{outline:3px solid var(--gold);outline-offset:2px;border-radius:var(--r-sm)}
.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
.wrap{max-width:1080px;margin:0 auto;padding:22px 18px 40px}
header.site{text-align:center;margin-bottom:16px}
.logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:12px}
.logo svg{height:40px;flex:none}
.logo .lt{font-size:20px;font-weight:800;color:var(--navy);line-height:1}
.logo .lt .ac{color:var(--rust)}
.logo .ls{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);display:block;margin-top:3px}
.eyebrow{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--terra-dark);margin:0 0 6px}
h1.title{font-family:var(--disp);font-weight:800;font-size:clamp(24px,4vw,38px);color:var(--navy);margin:0 0 4px}
.subhead{font-family:var(--serif);color:var(--ink-soft);font-size:15px}
/* controls */
.controls{position:sticky;top:0;z-index:20;background:rgba(250,250,249,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--line-soft);padding:12px 0;margin-bottom:18px}
.controls-in{max-width:1080px;margin:0 auto;padding:0 18px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:center}
.seg{display:inline-flex;background:var(--white);border:1px solid var(--line);border-radius:999px;padding:3px;box-shadow:var(--shadow)}
.seg button{border:none;background:transparent;color:var(--ink-soft);font-weight:700;font-size:13.5px;padding:8px 15px;border-radius:999px;transition:.15s}
.seg button:hover{color:var(--navy)}
.seg button[aria-pressed=true]{background:var(--navy);color:#fff}
.seg.gold button[aria-pressed=true]{background:var(--gold);color:var(--navy)}
.navbar{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.navbtn{width:40px;height:40px;border-radius:var(--r);border:1.5px solid var(--line);background:#fff;color:var(--navy);display:grid;place-items:center;font-size:18px;font-weight:800;transition:.15s;box-shadow:var(--shadow)}
.navbtn:hover{border-color:var(--navy);transform:translateY(-1px)}
.navbtn[disabled]{opacity:.35;cursor:not-allowed;transform:none}
.nowlabel{font-family:var(--disp);font-weight:800;font-size:clamp(16px,2.4vw,20px);color:var(--navy);min-width:200px;text-align:center}
.todaybtn{border:1.5px solid var(--gold);background:var(--gold);color:var(--navy);font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:999px}
.todaybtn:hover{background:var(--gold-light)}
/* cards */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow)}
.badge{display:inline-block;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:999px;white-space:nowrap}
.b-class{background:var(--tint);color:var(--navy)}
.b-exam{background:var(--rust);color:#fff}
.b-tbl{background:var(--gold);color:var(--navy)}
.b-review{background:var(--terra);color:#fff}
.b-ai{background:var(--navy);color:#fff}
.b-event{background:#e7dcf2;color:#5b2a7a}
.b-holiday{background:#e5e7ec;color:var(--slate)}
.sec-badge{background:var(--navy);color:#fff;font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.06em;padding:4px 9px;border-radius:999px}
/* daily */
.day-card{padding:24px;max-width:640px;margin:0 auto}
.day-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.day-date{font-family:var(--disp);font-weight:800;font-size:clamp(22px,3.4vw,30px);color:var(--navy)}
.day-week{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:18px}
.track{border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;background:var(--offwhite)}
.track h3{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:0 0 6px}
.track.lec h3{color:var(--terra-dark)}
.track.lab h3{color:var(--ok)}
.track p{font-size:16px;color:var(--navy);font-weight:600;line-height:1.4}
.noclass{text-align:center;color:var(--ink-faint);padding:26px;font-family:var(--serif);font-size:17px}
.day-card.is-exam{background:var(--rust);border-color:var(--rust)}
.day-card.is-exam .day-date,.day-card.is-exam .day-week{color:#fff}
.day-card.is-exam .sec-badge{background:#fff;color:var(--rust)}
.day-card.is-tbl{background:var(--gold);border-color:var(--gold)}
.day-card.is-tbl .day-date,.day-card.is-tbl .day-week{color:var(--navy)}
.day-card.is-tbl .sec-badge{background:var(--navy);color:#fff}
.day-card.is-tbl .track{background:rgba(255,255,255,.55);border-color:rgba(11,21,48,.16)}
.day-card.is-ai{background:var(--navy);border-color:var(--navy)}
.day-card.is-ai .day-date,.day-card.is-ai .day-week{color:#fff}
.day-card.is-ai .sec-badge{background:#fff;color:var(--navy)}
.day-card.is-ai .track{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}
.day-card.is-ai .track h3{color:var(--gold-light)}
.day-card.is-ai .track p{color:#fff}
.sem-row.is-exam{background:#fbeaea}
.sem-row.is-tbl{background:#faf4e4}
.sem-row.is-ai{background:#eef1f6}
/* weekly (vertical calendar cards) */
.week-head{text-align:center;margin-bottom:16px}
.week-head h2{font-size:clamp(19px,3vw,24px)}
.week-head .wt{font-family:var(--serif);color:var(--ink-soft);font-size:15px;margin-top:2px}
.wgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:14px;align-items:stretch}
.wcard{background:#fff;border:1px solid var(--line);border-top:5px solid var(--navy);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:15px 16px 18px;display:flex;flex-direction:column;gap:12px;min-height:190px}
.wcard.is-tbl{background:var(--gold);border-color:var(--gold);border-top-color:#a07d2f;color:var(--navy)}
.wcard.is-tbl .dow{color:rgba(11,21,48,.72)}
.wcard.is-tbl .dnum{color:var(--navy)}
.wcard.is-tbl .wtrack h4{color:rgba(11,21,48,.78)}
.wcard.is-tbl .wtrack p{color:var(--navy)}
.wcard.is-tbl .sec-badge{background:var(--navy);color:#fff}
.wcard.is-ai{background:var(--navy);border-color:var(--navy);border-top-color:var(--gold);color:#fff}
.wcard.is-ai .dow{color:var(--gold-light)}
.wcard.is-ai .dnum{color:#fff}
.wcard.is-ai .wtrack h4{color:var(--gold-light)}
.wcard.is-ai .wtrack p{color:#fff}
.wcard.is-ai .sec-badge{background:#fff;color:var(--navy)}
.wcard.is-review{border-top-color:var(--terra)}
.wcard.is-event{border-top-color:#7a4fa0}
.wcard.is-holiday{border-top-color:var(--slate);background:#f4f5f7}
.wcard.is-exam{background:var(--rust);border-color:var(--rust);border-top-color:#5b241b;color:#fff}
.wcard.today{outline:2px solid var(--gold);outline-offset:2px}
.wcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.wcard .dow{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);display:block}
.wcard .dnum{font-family:var(--disp);font-weight:800;font-size:19px;color:var(--navy);line-height:1.1;display:block;margin-top:2px}
.wcard.is-exam .dow{color:rgba(255,255,255,.82)}
.wcard.is-exam .dnum{color:#fff}
.wcard.is-exam .sec-badge{background:#fff;color:var(--rust)}
.wcard.is-holiday .sec-badge{background:var(--slate)}
.wtrack h4{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;margin:0 0 3px}
.wtrack.lec h4{color:var(--terra-dark)}.wtrack.lab h4{color:var(--ok)}
.wtrack p{font-size:14px;color:var(--navy);font-weight:600;line-height:1.35;margin:0}
.wcard.is-exam .wtrack h4{color:rgba(255,255,255,.85)}
.wcard.is-exam .wtrack p{color:#fff}
.wcard .holidaytxt{font-family:var(--serif);color:var(--slate);font-size:15px;margin-top:auto}
.exambig{font-family:var(--disp);font-weight:800;font-size:22px;color:#fff;margin-top:auto;line-height:1.15}
/* monthly */
.cal{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
@media(max-width:680px){.cal{grid-template-columns:repeat(2,1fr)}}
.cal-h{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);text-align:center;padding:4px 0}
@media(max-width:680px){.cal-h{display:none}}
.cell{min-height:96px;background:#fff;border:1px solid var(--line-soft);border-radius:var(--r);padding:8px 9px;text-align:left;display:flex;flex-direction:column;gap:5px;transition:.15s}
.cell.empty{background:transparent;border:none;min-height:0}
.cell.klass{cursor:pointer}
.cell.klass:hover{border-color:var(--navy);box-shadow:var(--shadow);transform:translateY(-1px)}
.cell .dn{font-weight:800;font-size:14px;color:var(--navy)}
.cell.today{outline:2px solid var(--gold);outline-offset:1px}
.cell .snip{font-size:11.5px;color:var(--ink-soft);line-height:1.3}
.cell .snip b{color:var(--navy);font-weight:700}
.cell.is-exam{background:var(--rust);border-color:var(--rust)}
.cell.is-exam .dn,.cell.is-exam .snip,.cell.is-exam .snip b{color:#fff}
.cell.is-exam .badge{background:#fff;color:var(--rust)}
.cell.is-tbl{background:var(--gold);border-color:var(--gold)}
.cell.is-tbl .dn,.cell.is-tbl .snip,.cell.is-tbl .snip b{color:var(--navy)}
.cell.is-tbl .badge{background:var(--navy);color:#fff}
.cell.is-ai{background:var(--navy);border-color:var(--navy)}
.cell.is-ai .dn,.cell.is-ai .snip,.cell.is-ai .snip b{color:#fff}
.cell.is-ai .badge{background:var(--gold);color:var(--navy)}
.cell.is-review{background:#fbeee7;border-color:#f0d3c4}
.cell.is-holiday{background:#eef0f3}
/* semester */
.sem-week{margin-bottom:14px;overflow:hidden}
.sem-head{display:flex;align-items:center;gap:12px;padding:13px 18px;background:var(--navy);color:#fff;flex-wrap:wrap}
.sem-head .wn{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.08em;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:999px}
.sem-head h3{color:#fff;font-size:15px;font-weight:700}
.sem-body{padding:6px 12px 12px}
.sem-row{display:grid;grid-template-columns:118px 1fr 1fr;gap:12px;padding:10px 6px;border-bottom:1px solid var(--line-soft);align-items:start}
.sem-row:last-child{border-bottom:none}
@media(max-width:680px){.sem-row{grid-template-columns:1fr;gap:4px}}
.sem-row .when{font-weight:800;font-size:13.5px;color:var(--navy)}
.sem-row .when span{display:block;font-family:var(--mono);font-weight:600;font-size:11px;color:var(--ink-faint);margin-top:2px}
.sem-row .cell-lec,.sem-row .cell-lab{font-size:13.5px;color:var(--navy)}
.sem-row .tk{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:2px}
.sem-row .cell-lec .tk{color:var(--terra-dark)}.sem-row .cell-lab .tk{color:var(--ok)}
.legend{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0 0 18px}
footer.site{text-align:center;margin-top:30px;color:var(--ink-faint);font-size:13px;border-top:1px solid var(--line-soft);padding-top:20px}
footer.site strong{color:var(--ink-soft)}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
</style>
</head>

      days.forEach(function(d){
        var lec=(state.track==="both"||state.track==="lecture")?(d.lecture?'<span class="tk">Lecture</span>'+esc(d.lecture):''):'';
        var lab=(state.track==="both"||state.track==="lab")?(d.lab?'<span class="tk">Lab</span>'+esc(d.lab):''):'';
        if(d.type==="holiday"){lec='<span style="color:var(--slate)">'+esc(d.lecture||d.lab||"No class")+'</span>';lab='';}
        h+='<div class="sem-row is-'+d.type+'"><div class="when">'+esc(d.dow)+' '+esc(fmtLong(d.date))+'<span>'+badge(d.type)+'</span></div><div class="cell-lec">'+lec+'</div><div class="cell-lab">'+lab+'</div></div>';
      });
      h+='</div></div>';
    });
    $("#view").innerHTML=h;
    $("#nowLabel").textContent="Weeks 1 to 17";
  }

  function legend(){
    var items=[["class","Class"],["tbl","TBL"],["ai","AI Project Lab"],["exam","Exam"],["holiday","No class"]];
    $("#legend").innerHTML=items.map(function(x){return badge(x[0]);}).join("");
  }

  function render(){
    setSeg("view",state.view);setSeg("section",state.section);setSeg("track",state.track);
    var navShow=state.view!=="sem";
    $("#prevBtn").style.display=navShow?"":"none";$("#nextBtn").style.display=navShow?"":"none";$("#nowLabel").style.display=navShow?"":"none";
    if(state.view==="day")renderDay();
    else if(state.view==="week")renderWeek();
    else if(state.view==="month")renderMonth();
    else renderSem();
    legend();
    updateSubhead();
    sendHeight();
  }
  function updateSubhead(){
    var s=state.section==="MW"?"Monday and Wednesday section":"Tuesday and Thursday section";
    $("#subhead").textContent="Lecture and lab, "+s+".";
  }

  /* nav */
  function step(dir){
    if(state.view==="day"){
      var cd=classDates();var i=cd.indexOf(state.date);
      if(i<0){var t=state.date;i=0;for(var k=0;k<cd.length;k++){if(cd[k]>=t){i=k;break;}}}
      i=Math.max(0,Math.min(cd.length-1,i+dir));state.date=cd[i];state.month=dparse(state.date).getMonth();
    }else if(state.view==="week"){
      var wn=weekOf(state.date)+dir;wn=Math.max(1,Math.min(17,wn));
      var wd=sectionDays().filter(function(d){return d.week===wn;}).sort(function(a,b){return a.date<b.date?-1:1;});
      if(wd.length){state.date=wd[0].date;state.month=dparse(state.date).getMonth();}
    }else if(state.view==="month"){
      state.month=Math.max(7,Math.min(11,state.month+dir));
    }
    render();
  }
  $("#prevBtn").addEventListener("click",function(){step(-1);});
  $("#nextBtn").addEventListener("click",function(){step(1);});
  $("#todayBtn").addEventListener("click",function(){state.date=initialDate();state.month=dparse(today()).getMonth()>=7&&dparse(today()).getMonth()<=11?dparse(today()).getMonth():dparse(state.date).getMonth();render();$("#view").focus();});

  document.querySelectorAll("[data-view]").forEach(function(b){b.addEventListener("click",function(){state.view=b.getAttribute("data-view");render();});});
  document.querySelectorAll("[data-section]").forEach(function(b){b.addEventListener("click",function(){state.section=b.getAttribute("data-section");if(classDates().indexOf(state.date)<0)state.date=initialDate();render();});});
  document.querySelectorAll("[data-track]").forEach(function(b){b.addEventListener("click",function(){state.track=b.getAttribute("data-track");render();});});

  /* iframe height-sender */
  function sendHeight(){var h=Math.max(document.body.scrollHeight,document.documentElement.scrollHeight);try{window.parent.postMessage({id:"mastery-os-schedule",frameId:"mastery-os-schedule",type:"resize",height:h},"*");}catch(e){}}
  window.addEventListener("load",sendHeight);window.addEventListener("resize",sendHeight);
  if(window.ResizeObserver){try{new ResizeObserver(sendHeight).observe(document.body);}catch(e){}}
  window.setTimeout(sendHeight,500);

  render();
})();
</script>
</body>
</html>
